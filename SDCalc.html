<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор SD-карты - FeySwitch</title>
    <meta name="description" content="Узнайте, сколько реального места останется на вашей флешке Nintendo Switch после установки прошивки и EmuNAND.">
    <link rel="icon" type="image/svg+xml" href="FSmini.svg">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        .calc-panel { background: rgba(20,20,20,0.6); border: 1px solid var(--border-color); padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .slider-container { margin-bottom: 24px; }
        .slider-container label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--text-main); }
        .slider-val { color: var(--accent-color); float: right; }
        input[type=range] { width: 100%; margin-top: 8px; accent-color: var(--text-main); }
        
        .result-box { background: #0a0a0a; border: 2px dashed #333; padding: 20px; border-radius: 8px; text-align: center; }
        .result-number { font-size: 3rem; font-weight: bold; color: #30d158; margin: 10px 0; font-family: monospace; }
        
        .visual-bar { display: flex; height: 30px; width: 100%; border-radius: 15px; overflow: hidden; margin-top: 20px; background: #222; }
        .bar-sys { background: #ff453a; transition: width 0.3s; }
        .bar-emu { background: #0a84ff; transition: width 0.3s; }
        .bar-free { background: #30d158; transition: width 0.3s; }
        
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 0.85rem; color: var(--text-muted); }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <main>
        <header>
            <h1>Калькулятор памяти</h1>
            <p>Производители флешек пишут 128ГБ, но по факту там 119ГБ. Плюс EmuNAND "откусывает" свой кусок. Посчитайте, сколько места останется под ваши игры!</p>
        </header>

        <section class="content-section calc-panel">
            
            <div class="slider-container">
                <label>Размер вашей MicroSD карты <span id="sdLabel" class="slider-val">128 ГБ</span></label>
                <input type="range" id="sdSize" min="64" max="1024" step="64" value="128">
            </div>

            <div class="slider-container">
                <label>Размер EmuNAND <span id="emuLabel" class="slider-val">29.8 ГБ (Стандарт)</span></label>
                <select id="emuSize" style="width: 100%; padding: 10px; background: #111; color: white; border: 1px solid #333; border-radius: 6px; font-size: 1rem;">
                    <option value="0">Без EmuNAND (Только SysNAND)</option>
                    <option value="4">4 ГБ (Минимум, только для ОС)</option>
                    <option value="12">12 ГБ (Оптимальный для UltraNX)</option>
                    <option value="29.8" selected>29.8 ГБ (Классический RAW)</option>
                </select>
            </div>

            <div class="result-box">
                <div style="color: var(--text-muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">Доступно для игр (на карте)</div>
                <div id="freeSpace" class="result-number">0 ГБ</div>
                <div style="font-size: 0.9rem; color: #888;">(Из реальных <span id="realSdSize">0</span> ГБ)</div>
                
                <!-- Визуальный график -->
                <div class="visual-bar">
                    <div id="barSys" class="bar-sys" title="Системные файлы (1 ГБ)"></div>
                    <div id="barEmu" class="bar-emu" title="EmuNAND"></div>
                    <div id="barFree" class="bar-free" title="Свободно"></div>
                </div>
                <div class="legend">
                    <div><span class="dot" style="background: #ff453a;"></span>Прошивка (1 ГБ)</div>
                    <div><span class="dot" style="background: #0a84ff;"></span>EmuNAND</div>
                    <div><span class="dot" style="background: #30d158;"></span>Игры</div>
                </div>
            </div>
            
        </section>

        <script>
            const sdSizeInput = document.getElementById('sdSize');
            const emuSizeInput = document.getElementById('emuSize');
            const sdLabel = document.getElementById('sdLabel');
            const emuLabel = document.getElementById('emuLabel');
            const freeSpaceDiv = document.getElementById('freeSpace');
            const realSdSizeSpan = document.getElementById('realSdSize');
            
            const barSys = document.getElementById('barSys');
            const barEmu = document.getElementById('barEmu');
            const barFree = document.getElementById('barFree');

            const calculate = () => {
                const declaredGB = parseInt(sdSizeInput.value);
                // Перевод маркетинговых ГБ в реальные ГиБиБайты (GiB) = умножить на 0.931
                const realGB = declaredGB * 0.931; 
                const emuGB = parseFloat(emuSizeInput.value);
                const systemGB = 1; // Место под файлы атмосферы, бутлоадера, пелоады

                let freeGB = realGB - emuGB - systemGB;
                if (freeGB < 0) freeGB = 0;

                // Обновляем текст
                sdLabel.innerText = `${declaredGB} ГБ`;
                realSdSizeSpan.innerText = realGB.toFixed(1);
                freeSpaceDiv.innerText = `${freeGB.toFixed(1)} ГБ`;

                // Обновляем график (проценты)
                const sysPct = (systemGB / realGB) * 100;
                const emuPct = (emuGB / realGB) * 100;
                const freePct = (freeGB / realGB) * 100;

                barSys.style.width = `${sysPct}%`;
                barEmu.style.width = `${emuPct}%`;
                barFree.style.width = `${freePct}%`;
            };

            // Слушатели событий (реактивность)
            sdSizeInput.addEventListener('input', calculate);
            emuSizeInput.addEventListener('change', calculate);

            // Первичный расчет при загрузке
            calculate();
        </script>

        <footer>
            <p>&copy; 2026 FeySwitch Homebrew. Создано <span style="color: var(--text-main); font-weight: 600;">Feylins</span>.</p>
        </footer>
    </main>
</body>
</html>
